services:
  - type: web
    name: vss-infra-simulator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.core.app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vss_infra_db
          property: connectionString

databases:
  - name: vss_infra_db
    plan: free
